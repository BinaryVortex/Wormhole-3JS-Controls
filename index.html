<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wormhole Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            text-shadow: 0 0 10px #00ffff;
            z-index: 10;
            pointer-events: none;
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 40, 0.85);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10;
            min-width: 280px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        
        .controls h3 {
            color: #00ffff;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            color: #00ffff;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 255, 0.2);
            outline: none;
            border-radius: 2px;
            -webkit-appearance: none;
        }
        
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff;
        }
        
        .control-group input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 10px #00ffff;
        }
        
        .control-group input[type="color"] {
            width: 100%;
            height: 35px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
        }
        
        .control-group .value {
            display: inline-block;
            color: #fff;
            font-size: 11px;
            margin-left: 8px;
            opacity: 0.7;
        }
        
        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        
        .preset-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        
        .preset-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        
        .toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 20, 40, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
            z-index: 10;
        }
        
        .toggle-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
        }
        
        .controls.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="info">
        <div class="title">WORMHOLE</div>
        <div class="subtitle">Move mouse to navigate</div>
    </div>
    
    <div class="controls" id="controls">
        <h3>Controls</h3>
        
        <div class="control-group">
            <label>Speed <span class="value" id="speedValue">1.0x</span></label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label>Particle Count <span class="value" id="particleValue">1000</span></label>
            <input type="range" id="particleCount" min="500" max="3000" step="100" value="1000">
        </div>
        
        <div class="control-group">
            <label>Rotation Speed <span class="value" id="rotationValue">1.0x</span></label>
            <input type="range" id="rotation" min="0.1" max="3" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label>Tunnel Color</label>
            <input type="color" id="tunnelColor" value="#00ffff">
        </div>
        
        <div class="control-group">
            <label>Particle Color</label>
            <input type="color" id="particleColor" value="#00ffff">
        </div>
        
        <div class="preset-buttons">
            <button class="preset-btn" onclick="applyPreset('cyber')">Cyber</button>
            <button class="preset-btn" onclick="applyPreset('sunset')">Sunset</button>
            <button class="preset-btn" onclick="applyPreset('matrix')">Matrix</button>
            <button class="preset-btn" onclick="applyPreset('purple')">Purple</button>
        </div>
    </div>
    
    <button class="toggle-btn" onclick="toggleControls()">Toggle Controls</button>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let tunnel, particles, stars;
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        
        // Control values
        let config = {
            speed: 1,
            particleCount: 1000,
            rotationSpeed: 1,
            tunnelColor: 0x00ffff,
            particleColor: 0x00ffff
        };
        
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.001);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // Create tunnel
            createTunnel();
            
            // Create particles
            createParticles();
            
            // Create background stars
            createStars();
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0x00ffff, 2, 100);
            pointLight.position.set(0, 0, 10);
            scene.add(pointLight);
            
            // Event listeners
            document.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);
            setupControls();
        }
        
        function setupControls() {
            document.getElementById('speed').addEventListener('input', (e) => {
                config.speed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = config.speed.toFixed(1) + 'x';
            });
            
            document.getElementById('particleCount').addEventListener('input', (e) => {
                config.particleCount = parseInt(e.target.value);
                document.getElementById('particleValue').textContent = config.particleCount;
                updateParticles();
            });
            
            document.getElementById('rotation').addEventListener('input', (e) => {
                config.rotationSpeed = parseFloat(e.target.value);
                document.getElementById('rotationValue').textContent = config.rotationSpeed.toFixed(1) + 'x';
            });
            
            document.getElementById('tunnelColor').addEventListener('input', (e) => {
                config.tunnelColor = parseInt(e.target.value.replace('#', '0x'));
                updateTunnelColor();
            });
            
            document.getElementById('particleColor').addEventListener('input', (e) => {
                config.particleColor = parseInt(e.target.value.replace('#', '0x'));
                updateParticleColor();
            });
        }
        
        function createTunnel() {
            if (tunnel) scene.remove(tunnel);
            tunnel = new THREE.Group();
            
            const numRings = 50;
            const ringSpacing = 2;
            
            for (let i = 0; i < numRings; i++) {
                const geometry = new THREE.TorusGeometry(3 + Math.sin(i * 0.5) * 0.5, 0.1, 16, 100);
                
                const material = new THREE.MeshBasicMaterial({
                    color: config.tunnelColor,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.6
                });
                
                const ring = new THREE.Mesh(geometry, material);
                ring.position.z = -i * ringSpacing;
                ring.rotation.x = Math.random() * 0.2;
                
                tunnel.add(ring);
            }
            
            scene.add(tunnel);
        }
        
        function updateTunnelColor() {
            tunnel.children.forEach(ring => {
                ring.material.color.setHex(config.tunnelColor);
            });
        }
        
        function createParticles() {
            if (particles) scene.remove(particles);
            
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(config.particleCount * 3);
            const velocities = [];
            
            for (let i = 0; i < config.particleCount; i++) {
                const i3 = i * 3;
                
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 4;
                
                positions[i3] = Math.cos(angle) * radius;
                positions[i3 + 1] = Math.sin(angle) * radius;
                positions[i3 + 2] = Math.random() * -100;
                
                velocities.push(0.5 + Math.random() * 1);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.1,
                color: config.particleColor,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            particles = new THREE.Points(geometry, material);
            particles.userData.velocities = velocities;
            scene.add(particles);
        }
        
        function updateParticles() {
            createParticles();
        }
        
        function updateParticleColor() {
            if (particles) {
                particles.material.color.setHex(config.particleColor);
            }
        }
        
        function createStars() {
            const starCount = 500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 200;
                positions[i3 + 1] = (Math.random() - 0.5) * 200;
                positions[i3 + 2] = (Math.random() - 0.5) * 200;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.05,
                color: 0xffffff,
                transparent: true,
                opacity: 0.6
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function toggleControls() {
            document.getElementById('controls').classList.toggle('hidden');
        }
        
        function applyPreset(preset) {
            const presets = {
                cyber: { tunnel: '#00ffff', particle: '#00ffff', speed: 1, rotation: 1 },
                sunset: { tunnel: '#ff6b35', particle: '#ffd93d', speed: 0.8, rotation: 0.7 },
                matrix: { tunnel: '#00ff41', particle: '#00ff41', speed: 1.5, rotation: 1.2 },
                purple: { tunnel: '#b388ff', particle: '#ea80fc', speed: 1.2, rotation: 0.9 }
            };
            
            const p = presets[preset];
            
            document.getElementById('tunnelColor').value = p.tunnel;
            document.getElementById('particleColor').value = p.particle;
            document.getElementById('speed').value = p.speed;
            document.getElementById('rotation').value = p.rotation;
            
            config.tunnelColor = parseInt(p.tunnel.replace('#', '0x'));
            config.particleColor = parseInt(p.particle.replace('#', '0x'));
            config.speed = p.speed;
            config.rotationSpeed = p.rotation;
            
            document.getElementById('speedValue').textContent = p.speed.toFixed(1) + 'x';
            document.getElementById('rotationValue').textContent = p.rotation.toFixed(1) + 'x';
            
            updateTunnelColor();
            updateParticleColor();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Move tunnel forward
            tunnel.position.z += 0.1 * config.speed;
            if (tunnel.position.z > 2) {
                tunnel.position.z = 0;
            }
            
            // Animate tunnel rings
            tunnel.children.forEach((ring, i) => {
                ring.rotation.z += (0.01 + i * 0.0001) * config.rotationSpeed;
                ring.scale.x = 1 + Math.sin(time + i) * 0.1;
                ring.scale.y = 1 + Math.sin(time + i) * 0.1;
            });
            
            // Animate particles
            const positions = particles.geometry.attributes.position.array;
            const velocities = particles.userData.velocities;
            
            for (let i = 0; i < positions.length; i += 3) {
                positions[i + 2] += velocities[i / 3] * config.speed;
                
                if (positions[i + 2] > 5) {
                    positions[i + 2] = -100;
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 4;
                    positions[i] = Math.cos(angle) * radius;
                    positions[i + 1] = Math.sin(angle) * radius;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            // Rotate stars slowly
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            
            // Camera movement based on mouse
            targetRotationX = mouseY * 0.3;
            targetRotationY = mouseX * 0.3;
            
            camera.rotation.x += (targetRotationX - camera.rotation.x) * 0.05;
            camera.rotation.y += (targetRotationY - camera.rotation.y) * 0.05;
            
            // Subtle camera bob
            camera.position.y = Math.sin(time * 0.5) * 0.2;
            
            renderer.render(scene, camera);
        }
        
        init();
        animate();
    </script>
</body>
</html>
